name: Build
on:
  push:
    branches: [ master, glic-2.34 ]
  pull_request:
    branches:
      - master
  workflow_dispatch:


permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: almalinux:9
    strategy:
      fail-fast: false
      matrix:
        # os: [windows-latest, macos-15, ubuntu-20.04]
        os: [ubuntu-latest]
    steps:
      - name: Setup Windows
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Setup NASM for Windows
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1.2.1
      - name: Install dependencies
        run: |
          dnf install -y git make gcc-c++ gzip which clang cmake zlib-devel openssl-devel
          ln -s /usr/bin/clang /usr/bin/clang-18
          ln -s /usr/bin/clang++ /usr/bin/clang++-18
          /usr/lib64/libc.so.6

      - name: Checkout Source
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build binaries
        run: |
          # git clone --recursive https://github.com/uNetworking/uWebSockets.js.git
          # cd uWebSockets.js

          # No clones, we build what we checked out
          ${{ matrix.os == 'windows-latest' && 'nmake' || 'make' }}
          ls dist
          cd tests && npm install ws && node smoke.js && cd ..
          ls dist

          # git fetch origin binaries:binaries
          # git checkout binaries
          # cp dist/*.node .
          # cp dist/*.js .
          # git rev-parse master > source_commit
          # ls
          # ${{ matrix.os != 'windows-latest' && 'git checkout master docs/index.d.ts && mv docs/index.d.ts .' || '' }}
          # git status
          # git config --global user.email "alexhultman@gmail.com"
          # git config --global user.name "Alex Hultman"
          # git commit -a -m "[GitHub Actions] Updated ${{ matrix.os }} binaries" || true
          # git push "https://unetworkingab:${{ secrets.SECRET }}@github.com/uNetworking/uWebSockets.js" binaries

      - name: Publish to GitHub Packages
        if: github.event_name != 'pull_request'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prepare package directory
          mkdir -p npm-package
          cp dist/*.node npm-package/
          cp dist/*.js npm-package/
          cp package.json npm-package/
          cp docs/index.d.ts npm-package/

          ls npm-package

          cd npm-package
          echo "@jimmyolo:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

          npm publish
