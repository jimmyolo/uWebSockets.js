      #     NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     # Prepare package directory
      #     mkdir -p npm-package
      #     cp dist/*.node npm-package/
      #     cp dist/*.js npm-package/
      #     cp package.json npm-package/
      #     cp docs/index.d.ts npm-package/