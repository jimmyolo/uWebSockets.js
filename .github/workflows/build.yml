name: Build
on:
  # push:
  #   branches: [ master ]
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    container: almalinux:9
    strategy:
      fail-fast: false
      matrix:
        # os: [windows-latest, macos-15, ubuntu-20.04]
        node-version: [22]
    steps:
      # - name: Setup Windows
      #   if: matrix.os == 'windows-latest'
      #   uses: ilammy/msvc-dev-cmd@v1
      # - name: Setup NASM for Windows
      #   if: matrix.os == 'windows-latest'
      #   uses: ilammy/setup-nasm@v1.2.1
      - name: Install dependencies
        run: |
          dnf install -y git make gcc-c++ gzip which clang cmake
          ln -s /usr/bin/clang /usr/bin/clang-18
          ln -s /usr/bin/clang++ /usr/bin/clang++-18
          /usr/lib64/libc.so.6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Update binaries
        run: |
          git clone --recursive https://github.com/uNetworking/uWebSockets.js.git
          cd uWebSockets.js
          ${{ matrix.os == 'windows-latest' && 'nmake' || 'make' }}
          ls dist
          cd tests && npm install ws && node smoke.js && cd ..
